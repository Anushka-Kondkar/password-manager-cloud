<!DOCTYPE html>
<html>

<head>

<title>Password Manager</title>

<style>

body {
    font-family: Arial;
    background: #f4f6f8;
    margin: 0;
}

.header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

.container {
    width: 900px;
    margin: 30px auto;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
}

input {
    padding: 8px;
    margin: 5px;
    width: 200px;
}

button {
    padding: 8px 16px;
    margin: 5px;
    background: #3498db;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #2980b9;
}

#output {
    background: #ecf0f1;
    padding: 15px;
    min-height: 80px;
    white-space: pre-wrap;
}

</style>

</head>

<body>

<div class="header">

Cloud Password Manager Dashboard

</div>

<div class="container">

<!-- REGISTER -->

<div class="card">

<h3>Register</h3>

<input id="regUsername" placeholder="Username">
<input id="regEmail" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">

<button onclick="register()">
Register
</button>

</div>

<!-- LOGIN -->

<div class="card">

<h3>Login</h3>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<!-- ADD PASSWORD -->

<div class="card">

<h3>Add Password</h3>

<input id="website" placeholder="Website">
<input id="accountUsername" placeholder="Account Username">
<input id="accountPassword" type="password" placeholder="Password">

<button onclick="addPassword()">
Add Password
</button>

</div>

<!-- VIEW PASSWORDS -->

<div class="card">

<h3>View Passwords</h3>

<button onclick="viewPasswords()">
Show Passwords
</button>

</div>

<!-- UPDATE PASSWORD -->

<div class="card">

<h3>Update Password</h3>

<input id="updateId" placeholder="Password ID">
<input id="newPassword" type="password" placeholder="New Password">

<button onclick="updatePassword()">
Update Password
</button>

</div>

<!-- DELETE PASSWORD -->

<div class="card">

<h3>Delete Password</h3>

<input id="deleteId" placeholder="Password ID">

<button onclick="deletePassword()">
Delete Password
</button>

</div>

<!-- SEARCH -->

<div class="card">

<h3>Search Password</h3>

<input id="searchWebsite" placeholder="Website">

<button onclick="searchPassword()">
Search
</button>

</div>

<!-- OUTPUT -->

<div class="card">

<h3>Output</h3>

<div id="output">
System ready
</div>

</div>

</div>

<script>

let userId = null;

function show(message) {
    document.getElementById("output")
        .innerText = message;
}

async function register() {

    const response =
    await fetch("/register", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({

            username:
            document.getElementById(
                "regUsername"
            ).value,

            email:
            document.getElementById(
                "regEmail"
            ).value,

            password:
            document.getElementById(
                "regPassword"
            ).value

        })
    });

    const data = await response.json();

    show(data.message);
}

async function login() {

    const response =
    await fetch("/login", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({

            email:
            document.getElementById(
                "loginEmail"
            ).value,

            password:
            document.getElementById(
                "loginPassword"
            ).value

        })
    });

    const data = await response.json();

    userId = data.user_id;

    show(data.message);
}

async function addPassword() {

    if (!userId) {
        show("Login first");
        return;
    }

    const response =
    await fetch("/add_password", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({

            user_id: userId,

            website:
            document.getElementById(
                "website"
            ).value,

            username:
            document.getElementById(
                "accountUsername"
            ).value,

            password:
            document.getElementById(
                "accountPassword"
            ).value

        })
    });

    const data = await response.json();

    show(data.message);
}

async function viewPasswords() {

    if (!userId) {
        show("Login first");
        return;
    }

    const response =
    await fetch("/passwords/" + userId);

    const data =
    await response.json();

    show(JSON.stringify(data, null, 2));
}

async function updatePassword() {

    const id =
    document.getElementById("updateId").value;

    const newPassword =
    document.getElementById("newPassword").value;

    const response =
    await fetch("/update_password", {

        method: "PUT",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({

            password_id: id,
            new_password: newPassword

        })
    });

    const data = await response.json();

    show(data.message);
}

async function deletePassword() {

    const id =
    document.getElementById("deleteId").value;

    const response =
    await fetch("/delete_password/" + id, {

        method: "DELETE"

    });

    const data = await response.json();

    show(data.message);
}

async function searchPassword() {

    const website =
    document.getElementById(
        "searchWebsite"
    ).value;

    const response =
    await fetch(
        "/search/" + userId + "/" + website
    );

    const data =
    await response.json();

    show(JSON.stringify(data, null, 2));
}

</script>

</body>
</html>
